<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="container">

        <h1>Rock Paper Scissors</h1>

        <div class="buttons">
            <button class="choice" data-choice="rock">🪨 Rock</button>
            <button class="choice" data-choice="paper">📄 Paper</button>
            <button class="choice" data-choice="scissors">✂️ Scissors</button>
        </div>

        <div class="display">
            <p id="playerChoice">Your Choice: ❔</p>
            <p id="computerChoice">Computer Choice: ❔</p>
            <h2 id="result">Make your move!</h2>
        </div>

        <div class="scoreBoard">
            <p>Player Score: <span id="playerScore">0</span></p>
            <p>Computer Score: <span id="computerScore">0</span></p>
        </div>

        <button id="resetBtn">Reset Game</button>

    </div>

    <script src="js/script.js"></script>
</body>
</html>
